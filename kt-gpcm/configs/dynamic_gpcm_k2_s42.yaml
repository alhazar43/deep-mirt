base:
  experiment_name: "dynamic_gpcm_k2_s42"
  device: "cuda"
  seed: 42

model:
  model_type: "dynamic_gpcm"
  n_questions: 200
  n_categories: 2
  n_traits: 1
  ability_scale: 1.0
  hidden_dim: 128

training:
  epochs: 30
  batch_size: 64
  lr: 0.001
  grad_clip: 1.0
  focal_weight: 0.5
  weighted_ordinal_weight: 0.5
  ordinal_penalty: 0.5
  lr_patience: 10
  lr_factor: 0.9
  attention_entropy_weight: 0.0
  theta_norm_weight: 0.0
  alpha_prior_weight: 0.0
  beta_prior_weight: 0.0

data:
  data_dir: "data"
  dataset_name: "large_5000_k2"
  train_split: 0.8
  min_seq_len: 10
